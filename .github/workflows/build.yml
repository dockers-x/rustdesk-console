name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      webclient_source:
        description: "Admin web UI repository"
        default: "https://github.com/lejianwen/rustdesk-api-web"

env:
  WEBCLIENT_SOURCE: ${{ github.event.inputs.webclient_source || 'https://github.com/lejianwen/rustdesk-api-web' }}

jobs:
  # Build the admin SPA once and share it with every target build.
  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build admin web UI
        run: |
          git clone --depth=1 "${WEBCLIENT_SOURCE}" web
          cd web
          corepack enable || true
          (yarn install --frozen-lockfile || yarn install || npm ci || npm install)
          (yarn build || npm run build)
      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: web/dist

  binaries:
    needs: webui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cross
        run: cargo install cross --locked || true
      - name: Pull in admin UI
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: resources/admin
      - name: Build (${{ matrix.target }})
        run: |
          cross build --release --target ${{ matrix.target }} -p rustdesk-api-server
      - name: Package
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/rustdesk-api-server release/
          cp -r conf release/
          mkdir -p release/data release/runtime
          tar -C release -czf rustdesk-console-${{ matrix.target }}.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-console-${{ matrix.target }}
          path: rustdesk-console-${{ matrix.target }}.tar.gz
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rustdesk-console-${{ matrix.target }}.tar.gz

  docker:
    needs: webui
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          build-args: |
            WEBCLIENT_SOURCE=${{ env.WEBCLIENT_SOURCE }}
